services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atomic
      POSTGRES_PASSWORD: atomic
      POSTGRES_DB: atomic_leads
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomic -d atomic_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
